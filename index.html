<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost Ball Online</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #090b11; color: #fff; font-family: Consolas, monospace; overflow: hidden; }
    #gameCanvas { display: block; width: 100vw; height: 100vh; }
    #overlay {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    #card {
      width: min(92vw, 560px); border: 1px solid #2a2f44; background: #0f1322; border-radius: 12px;
      padding: 20px;
    }
    h1 { margin-bottom: 14px; letter-spacing: 2px; }
    .row { display: flex; gap: 10px; margin-bottom: 10px; }
    input, button {
      border: 1px solid #303854; background: #151a2d; color: #fff; padding: 10px;
      border-radius: 8px; font-family: inherit;
    }
    input { flex: 1; }
    button { cursor: pointer; }
    button:hover { background: #1e2540; }
    #status { color: #8ea2ff; min-height: 20px; margin: 6px 0; }
    #topUi, #logBox {
      position: fixed; left: 12px; background: rgba(0, 0, 0, 0.65); border: 1px solid #2a2f44;
      border-radius: 8px; padding: 10px;
    }
    #topUi { top: 12px; z-index: 4; line-height: 1.7; min-width: 230px; }
    #logBox { bottom: 12px; max-width: 420px; z-index: 4; color: #bac6f0; }
    #crosshair {
      position: fixed; width: 18px; height: 18px; border: 2px solid #ffe45d; border-radius: 50%;
      transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 6;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="crosshair"></div>

  <div id="topUi">
    Oda: <span id="roomText">-</span><br />
    Durum: <span id="phaseText">Lobby</span><br />
    Oyuncu: <span id="playerCountText">0/0</span><br />
    Rol: <span id="roleText">-</span><br />
    Canli: <span id="aliveText">0</span>
  </div>

  <div id="logBox">Log bekleniyor...</div>

  <div id="overlay">
    <div id="card">
      <h1>GHOST BALL ONLINE</h1>
      <p style="color:#b5c0ea; margin-bottom:14px;">Host oda kurar, digerleri kodla katilir. Host "Maci Baslat" ile oyunu acsin.</p>
      <div class="row"><input id="nameInput" maxlength="14" placeholder="Oyuncu adi" /></div>
      <div class="row">
        <button id="createBtn">Oda Kur</button>
        <input id="roomInput" maxlength="5" placeholder="Oda Kodu" />
        <button id="joinBtn">Katil</button>
      </div>
      <div class="row">
        <button id="startBtn" disabled>Oda Dolunca Baslar</button>
      </div>
      <p style="color:#9aa8dd; margin-top:6px;">Kontroller: WASD hareket, <b>Space</b> yakin oldur (katil), <b>Tik</b> ates (serif, 5sn cooldown).</p>
      <div id="status"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const crosshair = document.getElementById("crosshair");

    let vw = window.innerWidth;
    let vh = window.innerHeight;
    canvas.width = vw;
    canvas.height = vh;

    let roomId = "";
    let myId = "";
    let hostId = "";
    let gameState = null;
    let camX = 0;
    let camY = 0;
    let mouseX = vw * 0.5;
    let mouseY = vh * 0.5;
    let keys = { up: false, down: false, left: false, right: false };

    const overlay = document.getElementById("overlay");
    const statusEl = document.getElementById("status");
    const roomText = document.getElementById("roomText");
    const phaseText = document.getElementById("phaseText");
    const roleText = document.getElementById("roleText");
    const aliveText = document.getElementById("aliveText");
    const playerCountText = document.getElementById("playerCountText");
    const logBox = document.getElementById("logBox");
    const startBtn = document.getElementById("startBtn");
    const nameInput = document.getElementById("nameInput");
    const roomInput = document.getElementById("roomInput");

    function setStatus(text, color = "#8ea2ff") {
      statusEl.textContent = text;
      statusEl.style.color = color;
    }

    function myPlayer() {
      if (!gameState || !gameState.players) return null;
      return gameState.players.find((p) => p.socketId === myId) || null;
    }

    function sendInput() {
      if (!roomId) return;
      socket.emit("input", { roomId, input: keys });
    }

    function connectOk(newRoomId) {
      roomId = newRoomId;
      roomText.textContent = roomId;
      setStatus("Baglandi. Oyuncular bekleniyor...", "#7dffa4");
    }

    document.getElementById("createBtn").onclick = () => {
      const name = nameInput.value.trim() || "Oyuncu";
      socket.emit("createRoom", { name }, (res) => {
        if (!res?.ok) return setStatus("Oda olusturulamadi.", "#ff8e8e");
        connectOk(res.roomId);
      });
    };

    document.getElementById("joinBtn").onclick = () => {
      const name = nameInput.value.trim() || "Oyuncu";
      const rid = roomInput.value.trim().toUpperCase();
      if (!rid) return setStatus("Oda kodu gir.", "#ff8e8e");
      socket.emit("joinRoom", { roomId: rid, name }, (res) => {
        if (!res?.ok) return setStatus(res?.message || "Katilim hata.", "#ff8e8e");
        connectOk(res.roomId);
      });
    };

    startBtn.onclick = () => {
      if (!roomId) return;
      socket.emit("startMatch", { roomId });
    };

    socket.on("connect", () => {
      myId = socket.id;
      setStatus("Sunucuya baglandi.");
    });

    socket.on("state", (state) => {
      gameState = state;
      hostId = state.hostSocketId;
      phaseText.textContent = state.status;
      aliveText.textContent = state.players.filter((p) => p.alive).length;
      playerCountText.textContent = `${state.players.length}/${state.capacity}`;
      startBtn.disabled = true;
      const me = myPlayer();
      roleText.textContent = me?.role ? me.role.toUpperCase() : "-";
      roleText.style.color = me?.role === "katil" ? "#ff5d5d" : (me?.role === "serif" ? "#ffe05d" : "#8dff95");
      overlay.style.display = roomId ? "none" : "flex";
      logBox.innerHTML = state.logs.map((l) => `- ${l.text}`).join("<br />") || "Log yok";
      if (state.status === "lobby") {
        if (state.players.length < state.capacity) {
          const missing = state.capacity - state.players.length;
          setStatus(`Bekleniyor: ${state.players.length}/${state.capacity} (eksik ${missing})`, "#ffd47e");
        } else {
          setStatus("Oda doldu, oyun basliyor...", "#7dffa4");
        }
      } else if (state.status === "running") {
        setStatus("Oyun devam ediyor.", "#7dffa4");
      }
      if (me && me.role === "serif" && me.alive && state.status === "running") {
        crosshair.style.display = "block";
      } else {
        crosshair.style.display = "none";
      }
    });

    socket.on("info", (payload) => {
      setStatus(payload?.text || "Bilgi mesaji.", "#ffb3b3");
    });

    window.addEventListener("resize", () => {
      vw = window.innerWidth;
      vh = window.innerHeight;
      canvas.width = vw;
      canvas.height = vh;
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyW" || e.code === "ArrowUp") keys.up = true;
      if (e.code === "KeyS" || e.code === "ArrowDown") keys.down = true;
      if (e.code === "KeyA" || e.code === "ArrowLeft") keys.left = true;
      if (e.code === "KeyD" || e.code === "ArrowRight") keys.right = true;
      if (e.code === "Space") {
        e.preventDefault();
        if (roomId) socket.emit("killerAttack", { roomId });
      }
      sendInput();
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "KeyW" || e.code === "ArrowUp") keys.up = false;
      if (e.code === "KeyS" || e.code === "ArrowDown") keys.down = false;
      if (e.code === "KeyA" || e.code === "ArrowLeft") keys.left = false;
      if (e.code === "KeyD" || e.code === "ArrowRight") keys.right = false;
      sendInput();
    });

    window.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      crosshair.style.left = `${mouseX}px`;
      crosshair.style.top = `${mouseY}px`;
    });

    window.addEventListener("click", () => {
      if (!gameState || !roomId || gameState.status !== "running") return;
      const me = myPlayer();
      if (!me || me.role !== "serif" || !me.alive) return;
      const worldX = mouseX + camX;
      const worldY = mouseY + camY;
      const ang = Math.atan2(worldY - me.y, worldX - me.x);
      socket.emit("sheriffShoot", { roomId, angle: ang });
    });

    function drawGrid() {
      ctx.fillStyle = "#0f1320";
      ctx.fillRect(0, 0, vw, vh);
      ctx.fillStyle = "#1a1f33";
      const step = 64;
      const startX = ((-camX % step) + step) % step;
      const startY = ((-camY % step) + step) % step;
      for (let x = startX; x < vw; x += step) {
        for (let y = startY; y < vh; y += step) {
          ctx.fillRect(x, y, 2, 2);
        }
      }
    }

    function drawPlayer(p) {
      const sx = p.x - camX;
      const sy = p.y - camY;
      if (sx < -40 || sx > vw + 40 || sy < -40 || sy > vh + 40) return;
      ctx.save();
      ctx.translate(sx, sy);
      if (!p.alive) ctx.globalAlpha = 0.25;
      ctx.beginPath();
      ctx.arc(0, 0, 13, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.45)";
      ctx.lineWidth = 2;
      ctx.stroke();
      if (p.socketId === myId) {
        ctx.beginPath();
        ctx.arc(0, 0, 18, 0, Math.PI * 2);
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = "rgba(255,255,255,0.65)";
        ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#f0f4ff";
      ctx.font = "11px Consolas";
      ctx.textAlign = "center";
      ctx.fillText(p.name, 0, -18);
      ctx.restore();
    }

    function drawBullets() {
      if (!gameState) return;
      for (const b of gameState.bullets) {
        const sx = b.x - camX;
        const sy = b.y - camY;
        ctx.beginPath();
        ctx.arc(sx, sy, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = "#ffe14f";
        ctx.fill();
      }
    }

    function updateCamera() {
      if (!gameState) return;
      const me = myPlayer();
      const mapW = gameState.map.w;
      const mapH = gameState.map.h;
      if (me) {
        camX += (me.x - vw * 0.5 - camX) * 0.18;
        camY += (me.y - vh * 0.5 - camY) * 0.18;
      }
      camX = Math.max(0, Math.min(mapW - vw, camX));
      camY = Math.max(0, Math.min(mapH - vh, camY));
    }

    function loop() {
      updateCamera();
      drawGrid();
      if (gameState) {
        drawBullets();
        for (const p of gameState.players) drawPlayer(p);
      }
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
